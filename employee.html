<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東海商販 出退勤</title>
<style>
:root {
  --navy:#0f1b35; --navy2:#1a2d52; --accent:#e8a020;
  --bg:#f0f3f8; --white:#fff; --border:#d0d7e3;
  --text:#1a2340; --muted:#6b7a99;
  --green:#1a9e5c; --green2:#137843;
  --red:#d63031; --red2:#a52828;
  --blue:#1565c0; --orange:#e07b00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--navy);color:#fff;padding:14px 20px;text-align:center;}
header h1{font-size:17px;font-weight:700;letter-spacing:.05em;}

.container{max-width:480px;margin:0 auto;padding:16px 14px;}

/* 従業員選択 */
.emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.emp-btn{
  padding:14px 8px;background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;color:var(--text);
}
.emp-btn:hover{border-color:var(--navy);background:#f0f4ff;}
.emp-btn.selected{border-color:var(--navy);background:var(--navy);color:#fff;}

.section-title{font-size:13px;color:var(--muted);font-weight:700;margin:16px 0 8px;letter-spacing:.05em;text-transform:uppercase;}

/* 打刻画面 */
#punchScreen{display:none;}
.punch-header{
  background:var(--white);border-radius:14px;padding:18px;
  text-align:center;margin-bottom:14px;
  border:1.5px solid var(--border);
}
.punch-name{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.punch-date{font-size:14px;color:var(--muted);}
.punch-time{font-size:36px;font-weight:700;color:var(--navy);margin:8px 0 4px;font-variant-numeric:tabular-nums;}

/* 勤務形態選択 */
.shift-section{
  background:var(--white);border-radius:14px;padding:16px;
  margin-bottom:14px;border:1.5px solid var(--border);
}
.shift-label{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:700;}
.shift-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.shift-btn{
  padding:12px 4px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--white);font-size:18px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;color:var(--text);
}
.shift-btn:hover{border-color:var(--accent);background:#fff8e8;}
.shift-btn.selected{border-color:var(--accent);background:var(--accent);color:var(--navy);}
.shift-time{font-size:9px;color:var(--muted);margin-top:3px;line-height:1.3;}
.shift-btn.selected .shift-time{color:var(--navy);}

/* 打刻ボタン */
.punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.punch-in-btn,.punch-out-btn{
  padding:20px 8px;border:none;border-radius:14px;
  font-size:18px;font-weight:700;cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.punch-in-btn{background:var(--green);color:#fff;}
.punch-in-btn:hover{background:var(--green2);}
.punch-out-btn{background:var(--red);color:#fff;}
.punch-out-btn:hover{background:var(--red2);}
.punch-in-btn:disabled,.punch-out-btn:disabled{opacity:.45;cursor:not-allowed;}
.punch-icon{font-size:26px;}
.punch-sub{font-size:12px;opacity:.85;}

/* 今日の記録 */
.today-card{
  background:var(--white);border-radius:14px;padding:16px;
  margin-bottom:14px;border:1.5px solid var(--border);
}
.today-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.today-row:last-child{border-bottom:none;}
.today-label{font-size:13px;color:var(--muted);}
.today-val{font-size:15px;font-weight:700;color:var(--text);}
.today-val.inner{color:var(--blue);}
.today-val.outer{color:var(--orange);}

/* 勤怠一覧表 */
.record-card{
  background:var(--white);border-radius:14px;padding:16px;
  margin-bottom:14px;border:1.5px solid var(--border);
}
.record-card h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;}
.rec-table{width:100%;border-collapse:collapse;font-size:12px;}
.rec-table th{background:var(--navy);color:#fff;padding:7px 5px;text-align:center;}
.rec-table td{padding:7px 5px;border-bottom:1px solid var(--border);text-align:center;}
.rec-table tr.weekend td{background:#fff8e1;}
.rec-table tr.saturday td{background:#e8f5e9;}
.rec-table .total-row td{background:var(--navy);color:#fff;font-weight:700;}
.td-inner{color:var(--blue);font-weight:700;}
.td-outer{color:var(--orange);font-weight:700;}

.back-btn{
  background:var(--white);border:1.5px solid var(--border);border-radius:10px;
  padding:11px;width:100%;font-size:14px;font-weight:700;cursor:pointer;
  color:var(--muted);margin-bottom:20px;
}
.back-btn:hover{background:var(--bg);}

.stamp{
  text-align:center;padding:18px;font-size:16px;font-weight:700;
  border-radius:12px;margin-bottom:12px;
}
.stamp-in{background:#d4edda;color:#155724;}
.stamp-out{background:#cce5ff;color:#004085;}
.stamp-err{background:#f8d7da;color:#721c24;}

.loading{text-align:center;padding:24px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<header><h1>🏢 東海商販 出退勤管理</h1></header>

<div class="container">

  <!-- 従業員選択画面 -->
  <div id="empScreen">
    <div class="section-title">名前を選んでください</div>
    <div class="emp-grid" id="empGrid">
      <div class="loading">読み込み中...</div>
    </div>
    <button class="punch-in-btn" style="width:100%;margin-top:8px;padding:14px;border-radius:12px;" onclick="goToPunch()">タイムカードを開く →</button>
  </div>

  <!-- 打刻画面 -->
  <div id="punchScreen">
    <div class="punch-header">
      <div class="punch-name" id="punchName">-</div>
      <div class="punch-date" id="punchDate">-</div>
      <div class="punch-time" id="punchClock">--:--</div>
    </div>

    <!-- 勤務形態選択 -->
    <div class="shift-section">
      <div class="shift-label">勤務形態を選択（出勤時に必ず選んでください）</div>
      <div class="shift-grid">
        <button class="shift-btn" onclick="selectShift('day',this)">
          日<div class="shift-time">8:00〜17:00</div>
        </button>
        <button class="shift-btn" onclick="selectShift('s1',this)">
          ①<div class="shift-time">8:00〜17:00</div>
        </button>
        <button class="shift-btn" onclick="selectShift('s2',this)">
          ②<div class="shift-time">16:00〜翌1:00</div>
        </button>
        <button class="shift-btn" onclick="selectShift('s3',this)">
          ③<div class="shift-time">0:00〜9:00</div>
        </button>
      </div>
    </div>

    <!-- 打刻ボタン -->
    <div class="punch-btns">
      <button class="punch-in-btn" id="btnIn" onclick="doPunch('in')">
        <span class="punch-icon">▶</span>
        出勤
        <span class="punch-sub">タップして打刻</span>
      </button>
      <button class="punch-out-btn" id="btnOut" onclick="doPunch('out')">
        <span class="punch-icon">■</span>
        退勤
        <span class="punch-sub">タップして打刻</span>
      </button>
    </div>

    <!-- スタンプ -->
    <div id="stampArea"></div>

    <!-- 今日の記録 -->
    <div class="today-card" id="todayCard" style="display:none;">
      <div class="today-row"><span class="today-label">勤務形態</span><span class="today-val" id="todayShift">-</span></div>
      <div class="today-row"><span class="today-label">出勤</span><span class="today-val" id="todayIn">-</span></div>
      <div class="today-row"><span class="today-label">退勤</span><span class="today-val" id="todayOut">-</span></div>
      <div class="today-row"><span class="today-label">合計時間</span><span class="today-val" id="todayTotal">-</span></div>
      <div class="today-row"><span class="today-label">時間内</span><span class="today-val inner" id="todayInner">-</span></div>
      <div class="today-row"><span class="today-label">時間外</span><span class="today-val outer" id="todayOuter">-</span></div>
    </div>

    <!-- 今月・先月の勤怠一覧 -->
    <div id="recordsArea"></div>

    <button class="back-btn" onclick="goBack()">← 名前選択に戻る</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZg6bsDIl427TEZ8v7ECY1ZfeADqyJRKZYZgiac3M-5cywdRpZr0qGjuTksgpNjtlD/exec';

const SHIFT_RULES = {
  'day': { label: '日', innerStart: 8*60,  innerEnd: 17*60 },
  's1':  { label: '①', innerStart: 8*60,  innerEnd: 17*60 },
  's2':  { label: '②', innerStart: 16*60, innerEnd: 25*60 },
  's3':  { label: '③', innerStart: 0*60,  innerEnd: 9*60  }
};

let employees = [];
let currentEmp = null;
let selectedShift = null;
let clockTimer = null;

async function gasCall(payload) {
  const url = GAS_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
  const r = await fetch(url);
  return r.json();
}

// ── 初期化 ────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const res = await gasCall({ action: 'getEmployees' });
  if (res.ok) employees = res.employees;
  renderEmpGrid();

  // URLパラメータで直接従業員指定
  const params = new URLSearchParams(location.search);
  const empId  = params.get('emp');
  if (empId) {
    const emp = employees.find(e => e.id === empId);
    if (emp) openPunch(emp);
  }
});

function renderEmpGrid() {
  const grid = document.getElementById('empGrid');
  if (!employees.length) {
    grid.innerHTML = '<p style="color:var(--muted);font-size:14px;grid-column:span 2;padding:16px 0;">管理者画面で従業員を登録してください</p>';
    return;
  }
  grid.innerHTML = employees.map(e => `
    <button class="emp-btn" onclick="selectEmp('${e.id}',this)">
      ${e.last} ${e.first}
    </button>
  `).join('');
}

function selectEmp(id, el) {
  document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  currentEmp = employees.find(e => e.id === id);
}

function goToPunch() {
  if (!currentEmp) { alert('名前を選んでください'); return; }
  openPunch(currentEmp);
}

async function openPunch(emp) {
  currentEmp = emp;
  document.getElementById('empScreen').style.display  = 'none';
  document.getElementById('punchScreen').style.display = 'block';
  document.getElementById('punchName').textContent = emp.last + ' ' + emp.first;

  startClock();
  await loadTodayRecord();
  await loadRecords();
}

function goBack() {
  document.getElementById('punchScreen').style.display = 'none';
  document.getElementById('empScreen').style.display   = 'block';
  if (clockTimer) clearInterval(clockTimer);
  selectedShift = null;
  document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('stampArea').innerHTML = '';
}

// ── 時計 ────────────────────────────────────────────────
function startClock() {
  updateClock();
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(updateClock, 1000);
}

function updateClock() {
  const now = new Date();
  const dateStr = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + ['日','月','火','水','木','金','土'][now.getDay()] + '）';
  document.getElementById('punchDate').textContent = dateStr;
  document.getElementById('punchClock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
}

// ── 勤務形態選択 ──────────────────────────────────────────
function selectShift(key, el) {
  document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedShift = key;
}

// ── 打刻 ──────────────────────────────────────────────────
async function doPunch(type) {
  if (type === 'in' && !selectedShift) {
    alert('勤務形態（日・①・②・③）を先に選んでください');
    return;
  }

  const now = new Date();
  const dateKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  document.getElementById('btnIn').disabled  = true;
  document.getElementById('btnOut').disabled = true;

  try {
    const res = await gasCall({
      action: 'punch',
      empId: currentEmp.id,
      type,
      time,
      dateKey,
      shift: selectedShift || 'day'
    });

    if (res.ok) {
      const label = type === 'in' ? '出勤' : '退勤';
      const cls   = type === 'in' ? 'stamp-in' : 'stamp-out';
      document.getElementById('stampArea').innerHTML =
        `<div class="stamp ${cls}">✓ ${time} ${label}打刻しました</div>`;
      await loadTodayRecord();
      await loadRecords();
    } else {
      document.getElementById('stampArea').innerHTML =
        `<div class="stamp stamp-err">エラー: ${res.error || '通信失敗'}</div>`;
    }
  } catch(e) {
    document.getElementById('stampArea').innerHTML =
      `<div class="stamp stamp-err">通信エラーが発生しました</div>`;
  }

  document.getElementById('btnIn').disabled  = false;
  document.getElementById('btnOut').disabled = false;
}

// ── 今日の記録読み込み ────────────────────────────────────
async function loadTodayRecord() {
  const now = new Date();
  const dateKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const res = await gasCall({ action: 'getRecords', startDate: dateKey, endDate: dateKey });
  if (!res.ok) return;

  const rec = res.records[currentEmp.id] && res.records[currentEmp.id][dateKey];
  if (rec) {
    const shiftLabel = rec.shift && SHIFT_RULES[rec.shift] ? SHIFT_RULES[rec.shift].label : '-';
    document.getElementById('todayCard').style.display = 'block';
    document.getElementById('todayShift').textContent = shiftLabel;
    document.getElementById('todayIn').textContent    = rec.in  || '-';
    document.getElementById('todayOut').textContent   = rec.out || '-';
    document.getElementById('todayTotal').textContent = rec.total || '-';
    document.getElementById('todayInner').textContent = rec.inner || '-';
    document.getElementById('todayOuter').textContent = rec.outer || '-';
  }
}

// ── 勤怠一覧 ────────────────────────────────────────────
async function loadRecords() {
  const area = document.getElementById('recordsArea');
  area.innerHTML = '<div class="loading">勤怠記録を読み込み中...</div>';

  const now = new Date();
  const periods = getCurrentAndPrevPeriod(now);

  let html = '';
  for (const p of periods) {
    const res = await gasCall({ action: 'getRecords', startDate: p.start, endDate: p.end });
    const recs = (res.ok && res.records[currentEmp.id]) ? res.records[currentEmp.id] : {};
    html += buildRecordTable(p.label, p.start, p.end, recs);
  }
  area.innerHTML = html || '<div class="loading">記録なし</div>';
}

function getCurrentAndPrevPeriod(now) {
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  let curYear, curMonth, prevYear, prevMonth;
  if (d >= 21) {
    curMonth = m + 1 > 12 ? 1 : m + 1;
    curYear  = m + 1 > 12 ? y + 1 : y;
  } else {
    curMonth = m;
    curYear  = y;
  }
  prevMonth = curMonth - 1 < 1 ? 12 : curMonth - 1;
  prevYear  = curMonth - 1 < 1 ? curYear - 1 : curYear;

  const fmt = (y,m) => y + '-' + String(m).padStart(2,'0');
  const curStart  = fmt(prevYear, prevMonth) + '-21';
  const curEnd    = fmt(curYear, curMonth)   + '-20';
  const prevStart = fmt(prevMonth-1<1?prevYear-1:prevYear, prevMonth-1<1?12:prevMonth-1) + '-21';
  const prevEnd   = fmt(prevYear, prevMonth) + '-20';

  return [
    { label: '今月（' + curStart + ' ～ ' + curEnd + '）', start: curStart, end: curEnd },
    { label: '先月（' + prevStart + ' ～ ' + prevEnd + '）', start: prevStart, end: prevEnd }
  ];
}

function buildRecordTable(label, startDate, endDate, recs) {
  const days = [];
  const sd = new Date(startDate + 'T00:00:00');
  const ed = new Date(endDate   + 'T00:00:00');
  for (let d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) {
    days.push(new Date(d));
  }

  const DOW = ['日','月','火','水','木','金','土'];
  let totalMin = 0, innerMin = 0, outerMin = 0;

  let rows = '';
  days.forEach(d => {
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const r   = recs[key] || {};
    const dow = d.getDay();
    const cls = dow === 0 ? 'weekend' : dow === 6 ? 'saturday' : '';
    const label2 = String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const shiftLabel = r.shift && SHIFT_RULES[r.shift] ? SHIFT_RULES[r.shift].label : '';

    if (r.total) totalMin += strToMin(r.total);
    if (r.inner) innerMin += strToMin(r.inner);
    if (r.outer) outerMin += strToMin(r.outer);

    rows += `<tr class="${cls}">
      <td>${label2}</td><td>${DOW[dow]}</td>
      <td>${shiftLabel}</td>
      <td>${r.in||''}</td><td>${r.out||''}</td>
      <td>${r.total||''}</td>
      <td class="td-inner">${r.inner||''}</td>
      <td class="td-outer">${r.outer||''}</td>
    </tr>`;
  });

  return `
    <div class="record-card">
      <h3>📅 ${label}</h3>
      <div style="overflow-x:auto;">
        <table class="rec-table">
          <thead><tr>
            <th>日付</th><th>曜</th><th>形態</th>
            <th>出勤</th><th>退勤</th>
            <th>合計</th><th style="color:#90caf9;">時間内</th><th style="color:#ffcc80;">時間外</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td colspan="5" style="text-align:right;">合計</td>
              <td>${minToStr(totalMin)}</td>
              <td>${minToStr(innerMin)}</td>
              <td>${minToStr(outerMin)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function strToMin(s) {
  if (!s) return 0;
  const hMatch = s.match(/(\d+)時間/);
  const mMatch = s.match(/(\d+)分/);
  return (hMatch ? parseInt(hMatch[1]) * 60 : 0) + (mMatch ? parseInt(mMatch[1]) : 0);
}

function minToStr(m) {
  if (m <= 0) return '0時間0分';
  return Math.floor(m/60) + '時間' + (m%60) + '分';
}
</script>
</body>
</html>
