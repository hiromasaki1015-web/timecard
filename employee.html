<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打刻 - 勤怠管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Shippori+Mincho:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #0d1f3c;
  --bg2: #112244;
  --surface: #1a3060;
  --card: #ffffff;
  --accent-in: #17a854;
  --accent-in2: #128a43;
  --accent-out: #d63031;
  --accent-out2: #b02020;
  --gold: #f0b429;
  --sky: #5aaaff;
  --text: #1a2540;
  --text-inv: rgba(255,255,255,0.92);
  --text-soft: rgba(255,255,255,0.55);
  --line: #d0daea;
  --muted: #8a9bb8;
  --shadow: 0 8px 32px rgba(0,0,0,0.25);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text-inv);
  overflow-x: hidden;
}

/* background pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(90,170,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(23,168,84,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; position: relative; z-index: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  height: 56px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(13,31,60,0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.topbar-logo {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--text-inv);
  opacity: 0.9;
}
.topbar-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--gold);
  font-weight: 700;
}
.back-link {
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  transition: color 0.2s;
  padding: 0;
}
.back-link:hover { color: var(--text-inv); }

/* ── SELECT SCREEN ── */
#screen-select {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.select-wrap {
  width: 100%;
  max-width: 420px;
}
.select-heading {
  text-align: center;
  margin-bottom: 32px;
}
.select-heading .title {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 5px;
  margin-bottom: 6px;
}
.select-heading .sub {
  font-size: 12px;
  color: var(--text-soft);
  letter-spacing: 2px;
}
.name-list { display: flex; flex-direction: column; gap: 10px; }
.name-btn {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-inv);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 3px;
  backdrop-filter: blur(8px);
}
.name-btn:hover {
  background: rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.25);
  transform: translateX(4px);
}
.name-btn .arrow { font-size: 18px; opacity: 0.45; }
.empty-note { text-align: center; color: var(--text-soft); font-size: 13px; padding: 40px 0; line-height: 2; }

/* ── PUNCH SCREEN ── */
#screen-punch { }

.punch-hero {
  background: linear-gradient(180deg, var(--bg2) 0%, rgba(17,34,68,0.6) 100%);
  padding: 28px 24px 24px;
  text-align: center;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.punch-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.punch-dt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-soft);
  letter-spacing: 1px;
}

.punch-body {
  flex: 1;
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
}

/* today status */
.today-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  backdrop-filter: blur(8px);
}
.today-card-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text-soft);
  margin-bottom: 14px;
  font-weight: 600;
}
.today-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.today-row:last-child { border-bottom: none; }
.today-label { font-size: 13px; color: var(--text-soft); display: flex; align-items: center; gap: 7px; }
.today-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
}
.tv-empty { color: rgba(255,255,255,0.2); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }
.tv-in { color: #4ade80; }
.tv-out { color: #f87171; }
.tv-hrs { color: var(--sky); }

/* punch buttons */
.punch-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.pbtn {
  padding: 32px 12px 24px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans JP', sans-serif;
  position: relative;
  overflow: hidden;
}
.pbtn:active { transform: scale(0.96); }
.pbtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.pbtn-in {
  background: var(--accent-in);
  box-shadow: 0 8px 28px rgba(23,168,84,0.4);
}
.pbtn-in:hover:not(:disabled) { background: var(--accent-in2); box-shadow: 0 10px 32px rgba(23,168,84,0.5); }
.pbtn-out {
  background: var(--accent-out);
  box-shadow: 0 8px 28px rgba(214,48,49,0.4);
}
.pbtn-out:hover:not(:disabled) { background: var(--accent-out2); box-shadow: 0 10px 32px rgba(214,48,49,0.5); }

.pbtn-label {
  display: block;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 5px;
  color: white;
  margin-bottom: 8px;
}
.pbtn-sub {
  display: block;
  font-size: 10px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 1px;
}
.pbtn-done-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.25);
  color: white;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}

/* history */
.hist-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  padding: 16px 18px;
  backdrop-filter: blur(8px);
}
.hist-title { font-size: 10px; letter-spacing: 3px; color: var(--text-soft); margin-bottom: 12px; font-weight: 600; }
.hist-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
}
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 12px; color: var(--text-soft); white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
.hist-times { display: flex; gap: 8px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.ht-in { color: #4ade80; }
.ht-sep { color: rgba(255,255,255,0.2); }
.ht-out { color: #f87171; }
.ht-hrs { color: var(--sky); font-size: 11px; }
.edit-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.6);
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
  flex-shrink: 0;
}
.edit-btn:hover { background: rgba(255,255,255,0.14); color: white; }

/* ── STAMP ── */
.stamp-overlay {
  position: fixed; inset: 0;
  background: rgba(13,31,60,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.stamp-overlay.show { opacity: 1; pointer-events: all; }
.stamp-inner {
  text-align: center;
  transform: scale(0) rotate(-12deg);
  transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
.stamp-overlay.show .stamp-inner { transform: scale(1) rotate(-12deg); }
.stamp-box {
  display: inline-block;
  border: 7px solid #e53e3e;
  border-radius: 10px;
  padding: 16px 40px;
}
.stamp-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 64px;
  font-weight: 700;
  color: #e53e3e;
  letter-spacing: 8px;
  display: block;
}
.stamp-time-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  color: #e53e3e;
  opacity: 0.85;
  margin-top: 6px;
}

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 500;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal {
  background: white;
  border-radius: 18px;
  padding: 28px;
  width: 90%; max-width: 340px;
  transform: translateY(16px);
  transition: transform 0.2s;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.modal-bg.show .modal { transform: translateY(0); }
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #1a2540; letter-spacing: 1px; }
.mf-label { display: block; font-size: 11px; letter-spacing: 2px; color: #6b7a9a; margin-bottom: 5px; font-weight: 600; }
.mf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.mf-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #d0daea;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  color: #1a2540;
  background: #f6f8fc;
}
.mf-input:focus { outline: none; border-color: #5aaaff; }
.modal-btns { display: flex; gap: 10px; }
.mbtn {
  flex: 1; padding: 11px;
  border: none; border-radius: 8px;
  font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700; cursor: pointer; letter-spacing: 1px;
  transition: all 0.2s;
}
.mbtn-cancel { background: #f0f3f8; color: #6b7a9a; }
.mbtn-save { background: #0f1b35; color: white; }
.mbtn-save:hover { background: #1a2d52; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(26,48,96,0.95);
  color: white;
  padding: 12px 26px;
  border-radius: 28px;
  font-size: 13px;
  z-index: 10000;
  transition: transform 0.3s;
  white-space: nowrap;
  box-shadow: 0 8px 28px rgba(0,0,0,0.35);
  pointer-events: none;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: rgba(23,130,60,0.95); }
.toast.err { background: rgba(180,40,40,0.95); }

@media (max-width: 400px) {
  .punch-btns { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR (shared) -->
<div class="topbar" style="position:fixed; top:0; width:100%; z-index:200;">
  <div class="topbar-logo">勤怠打刻</div>
  <div class="topbar-clock" id="topClock">--:--:--</div>
  <button class="back-link" id="topBackBtn" onclick="goBack()" style="visibility:hidden;">← 名前選択</button>
</div>

<!-- padding for fixed topbar -->
<div style="height:56px;"></div>

<!-- ======================================================= -->
<!-- SCREEN: SELECT NAME -->
<!-- ======================================================= -->
<div class="screen active" id="screen-select">
  <div class="select-wrap">
    <div class="select-heading">
      <div class="title">打刻する方を選択</div>
      <div class="sub">お名前をタップしてください</div>
    </div>
    <div class="name-list" id="nameList">
      <div class="empty-note">管理者画面で従業員を登録すると<br>ここに名前が表示されます</div>
    </div>
  </div>
</div>

<!-- ======================================================= -->
<!-- SCREEN: PUNCH -->
<!-- ======================================================= -->
<div class="screen" id="screen-punch">
  <div class="punch-hero">
    <div class="punch-name" id="punchName">──</div>
    <div class="punch-dt" id="punchDt">----/--/-- --:--:--</div>
  </div>
  <div class="punch-body">

    <div class="today-card">
      <div class="today-card-title">本日の記録</div>
      <div class="today-row">
        <span class="today-label"><span>🟢</span> 出勤時刻</span>
        <span class="today-val tv-empty" id="si-in">未打刻</span>
      </div>
      <div class="today-row">
        <span class="today-label"><span>🔴</span> 退勤時刻</span>
        <span class="today-val tv-empty" id="si-out">未打刻</span>
      </div>
      <div class="today-row">
        <span class="today-label"><span>⏱</span> 勤務時間</span>
        <span class="today-val tv-empty" id="si-hrs">──</span>
      </div>
    </div>

    <div class="punch-btns">
      <button class="pbtn pbtn-in" id="btnIn" onclick="doPunchIn()">
        <span class="pbtn-label">出勤</span>
        <span class="pbtn-sub">タップして記録</span>
      </button>
      <button class="pbtn pbtn-out" id="btnOut" onclick="doPunchOut()">
        <span class="pbtn-label">退勤</span>
        <span class="pbtn-sub">タップして記録</span>
      </button>
    </div>

    <div class="hist-card">
      <div class="hist-title" id="monthlyTitle">今月の勤怠（20日締め）</div>
      <div id="monthlyTable"><div style="color:rgba(255,255,255,0.25); font-size:12px; padding:8px 0;">読み込み中...</div></div>
      <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.5);">合計勤務時間</span>
        <span id="monthlyTotalVal" style="font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#7eb8f0;">──</span>
      </div>
    </div>

    <div class="hist-card" style="margin-top:12px;">
      <div class="hist-title" id="prevMonthlyTitle">先月の勤怠（20日締め）</div>
      <div id="prevMonthlyTable"><div style="color:rgba(255,255,255,0.25); font-size:12px; padding:8px 0;">読み込み中...</div></div>
      <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.5);">合計勤務時間</span>
        <span id="prevMonthlyTotalVal" style="font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:#7eb8f0;">──</span>
      </div>
    </div>
  </div>
</div>

<!-- STAMP -->
<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp-inner">
    <div class="stamp-box">
      <span class="stamp-kanji" id="stampLabel">出勤</span>
      <div class="stamp-time-lbl" id="stampTime"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>打刻を修正</h3>
    <div class="mf-row">
      <div>
        <label class="mf-label">出勤時刻</label>
        <input type="time" class="mf-input" id="meIn">
      </div>
      <div>
        <label class="mf-label">退勤時刻</label>
        <input type="time" class="mf-input" id="meOut">
      </div>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="mbtn mbtn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// GAS API エンドポイント
// ─────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZg6bsDIl427TEZ8v7ECY1ZfeADqyJRKZYZgiac3M-5cywdRpZr0qGjuTksgpNjtlD/exec';

async function gasCall(data) {
  // GASのCORS制限のためJSONPライク（no-cors）ではなくURLパラメータでGETを使う
  const url = GAS_URL + '?payload=' + encodeURIComponent(JSON.stringify(data));
  const res = await fetch(url, { method: 'GET' });
  return await res.json();
}

// ─────────────────────────────────────────
// 状態管理
// ─────────────────────────────────────────
let employees = [];
let todayRecords = {}; // { empId: { in, out } }
let settings = { manager: { last:'', first:'' }, emailSettings: { addresses:[], senderName:'' } };
let currentEmpId = null;
let editEmpId = null;
let editDateKey = null;

// ─────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────
const pad2 = n => String(n).padStart(2,'0');
const DAYS = ['日','月','火','水','木','金','土'];

function updateClock() {
  const now = new Date();
  const t = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  document.getElementById('topClock').textContent = t;
  const dt = document.getElementById('punchDt');
  if (dt) dt.textContent = `${now.getFullYear()}/${pad2(now.getMonth()+1)}/${pad2(now.getDate())}（${DAYS[now.getDay()]}）${t}`;
}
setInterval(updateClock, 1000);
updateClock();

function todayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${pad2(n.getMonth()+1)}-${pad2(n.getDate())}`;
}

function calcHours(a, b) {
  if (!a || !b) return null;
  const [ah,am] = a.split(':').map(Number);
  const [bh,bm] = b.split(':').map(Number);
  const d = (bh*60+bm)-(ah*60+am);
  if (d < 0) return null;
  return `${Math.floor(d/60)}時間${d%60}分`;
}

// ─────────────────────────────────────────
// 初期データ読み込み
// ─────────────────────────────────────────
async function loadInitialData() {
  showLoading(true);
  try {
    const [empRes, recRes, setRes] = await Promise.all([
      gasCall({ action: 'getEmployees' }),
      gasCall({ action: 'getRecords', startDate: todayKey(), endDate: todayKey() }),
      gasCall({ action: 'getSettings' })
    ]);
    if (empRes.ok) employees = empRes.employees || [];
    if (recRes.ok) {
      // 今日の記録だけキャッシュ
      Object.keys(recRes.records).forEach(empId => {
        todayRecords[empId] = recRes.records[empId][todayKey()] || null;
      });
    }
    if (setRes.ok) settings = setRes.settings;
  } catch(e) {
    showToast('データの読み込みに失敗しました', 'err');
  }
  showLoading(false);
}

function showLoading(on) {
  const list = document.getElementById('nameList');
  if (on) list.innerHTML = '<div class="empty-note">読み込み中...</div>';
}

// ─────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  const backBtn = document.getElementById('topBackBtn');
  backBtn.style.visibility = name === 'punch' ? 'visible' : 'hidden';
  if (name === 'select') renderNameList();
}

function goBack() { showScreen('select'); }

// ─────────────────────────────────────────
// NAME LIST
// ─────────────────────────────────────────
function renderNameList() {
  const list = document.getElementById('nameList');
  if (employees.length === 0) {
    list.innerHTML = '<div class="empty-note">管理者画面で従業員を登録すると<br>ここに名前が表示されます</div>';
    return;
  }
  list.innerHTML = employees.map(e =>
    `<button class="name-btn" onclick="openPunch('${e.id}')">
      <span>${e.last} ${e.first}</span>
      <span class="arrow">›</span>
    </button>`
  ).join('');
}

// ─────────────────────────────────────────
// PUNCH SCREEN
// ─────────────────────────────────────────
async function openPunch(empId) {
  const emp = employees.find(e => e.id === empId);
  if (!emp) return;
  currentEmpId = empId;
  document.getElementById('punchName').textContent = `${emp.last} ${emp.first}`;
  showScreen('punch');
  // 今日の記録をスプレッドシートから最新取得
  try {
    const res = await gasCall({ action: 'getRecords', startDate: todayKey(), endDate: todayKey() });
    if (res.ok) {
      Object.keys(res.records).forEach(id => {
        todayRecords[id] = res.records[id][todayKey()] || null;
      });
    }
  } catch(e) {}
  renderPunchScreen();
  await loadHistory(empId);
}

function getTodayRec(empId) { return todayRecords[empId] || null; }

function renderPunchScreen() {
  if (!currentEmpId) return;
  const rec = getTodayRec(currentEmpId);
  const inEl = document.getElementById('si-in');
  const outEl = document.getElementById('si-out');
  const hrsEl = document.getElementById('si-hrs');
  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');

  btnIn.querySelectorAll('.pbtn-done-badge').forEach(e => e.remove());
  btnOut.querySelectorAll('.pbtn-done-badge').forEach(e => e.remove());

  if (rec?.in) {
    inEl.textContent = rec.in; inEl.className = 'today-val tv-in';
    btnIn.disabled = true;
    btnIn.querySelector('.pbtn-sub').textContent = '打刻済み';
    const b = document.createElement('span'); b.className = 'pbtn-done-badge'; b.textContent = '✓ 済'; btnIn.appendChild(b);
  } else {
    inEl.textContent = '未打刻'; inEl.className = 'today-val tv-empty';
    btnIn.disabled = false;
    btnIn.querySelector('.pbtn-sub').textContent = 'タップして記録';
  }
  if (rec?.out) {
    outEl.textContent = rec.out; outEl.className = 'today-val tv-out';
    btnOut.disabled = true;
    btnOut.querySelector('.pbtn-sub').textContent = '打刻済み';
    const b = document.createElement('span'); b.className = 'pbtn-done-badge'; b.textContent = '✓ 済'; btnOut.appendChild(b);
  } else {
    outEl.textContent = '未打刻'; outEl.className = 'today-val tv-empty';
    btnOut.disabled = false;
    btnOut.querySelector('.pbtn-sub').textContent = 'タップして記録';
  }
  if (rec?.in && rec?.out) {
    const h = calcHours(rec.in, rec.out);
    hrsEl.textContent = h || '──';
    hrsEl.className = h ? 'today-val tv-hrs' : 'today-val tv-empty';
  } else {
    hrsEl.textContent = '──'; hrsEl.className = 'today-val tv-empty';
  }
}

async function doPunchIn() {
  if (!currentEmpId) return;
  const rec = getTodayRec(currentEmpId);
  if (rec?.in) { showToast('既に出勤打刻済みです', 'err'); return; }
  const t = `${pad2(new Date().getHours())}:${pad2(new Date().getMinutes())}`;
  const key = todayKey();

  // 即座にUI更新
  if (!todayRecords[currentEmpId]) todayRecords[currentEmpId] = {};
  todayRecords[currentEmpId].in = t;
  showStamp('出勤', t);
  renderPunchScreen();
  showToast(`出勤 ${t} を記録しました`, 'ok');

  // スプレッドシートに保存
  try {
    await gasCall({ action: 'punch', empId: currentEmpId, type: 'in', time: t, dateKey: key });
  } catch(e) { showToast('保存に失敗しました。再度お試しください', 'err'); }

  // メール送信
  const emp = employees.find(e => e.id === currentEmpId);
  if (emp) sendPunchEmail(emp, key, todayRecords[currentEmpId], 'in');
  await loadHistory(currentEmpId);
}

async function doPunchOut() {
  if (!currentEmpId) return;
  const rec = getTodayRec(currentEmpId);
  if (!rec?.in) { showToast('先に出勤打刻をしてください', 'err'); return; }
  if (rec?.out) { showToast('既に退勤打刻済みです', 'err'); return; }
  const t = `${pad2(new Date().getHours())}:${pad2(new Date().getMinutes())}`;
  const key = todayKey();

  todayRecords[currentEmpId].out = t;
  showStamp('退勤', t);
  renderPunchScreen();
  showToast(`退勤 ${t} を記録しました`, 'ok');

  try {
    await gasCall({ action: 'punch', empId: currentEmpId, type: 'out', time: t, dateKey: key });
  } catch(e) { showToast('保存に失敗しました。再度お試しください', 'err'); }

  const emp = employees.find(e => e.id === currentEmpId);
  if (emp) sendPunchEmail(emp, key, todayRecords[currentEmpId], 'out');
  await loadHistory(currentEmpId);
}

// ─────────────────────────────────────────
// HISTORY（直近7日をGASから取得）
// ─────────────────────────────────────────
let historyCache = {};

// 20日締めの期間を取得
function getMonthlyPeriod() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  let startYear, startMonth, endYear, endMonth;
  if (now.getDate() >= 21) {
    startYear = now.getFullYear();
    startMonth = now.getMonth() + 1;
    endMonth = now.getMonth() + 2;
    endYear = now.getFullYear();
    if (endMonth > 12) { endMonth = 1; endYear++; }
  } else {
    startMonth = now.getMonth();
    startYear = now.getFullYear();
    if (startMonth === 0) { startMonth = 12; startYear--; }
    endYear = now.getFullYear();
    endMonth = now.getMonth() + 1;
  }
  return {
    startDate: startYear + '-' + pad(startMonth) + '-21',
    endDate: endYear + '-' + pad(endMonth) + '-20'
  };
}

// 先月の20日締め期間を取得
function getPrevMonthlyPeriod() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const cur = getMonthlyPeriod();
  // 今月の開始日の前日から1ヶ月前
  const curStart = new Date(cur.startDate + 'T00:00:00');
  const prevEnd = new Date(curStart);
  prevEnd.setDate(prevEnd.getDate() - 1); // 今月開始日の前日 = 先月20日
  const prevStart = new Date(prevEnd);
  prevStart.setDate(1); // まず1日に
  prevStart.setDate(prevStart.getDate() - 10); // 前月21日へ
  // 前月21日を正確に計算
  let sy = prevEnd.getFullYear();
  let sm = prevEnd.getMonth(); // 先月
  if (sm === 0) { sm = 12; sy--; }
  return {
    startDate: sy + '-' + pad(sm) + '-21',
    endDate: prevEnd.getFullYear() + '-' + pad2(prevEnd.getMonth()+1) + '-' + pad2(prevEnd.getDate())
  };
}

let monthlyCache = {};

let prevMonthlyCache = {};

async function loadHistory(empId) {
  // 今月（20日締め）
  const period = getMonthlyPeriod();
  try {
    const res = await gasCall({ action: 'getRecords', startDate: period.startDate, endDate: period.endDate });
    if (res.ok) monthlyCache = res.records[empId] || {};
  } catch(e) {}
  renderMonthly(period, 'monthlyTitle', 'monthlyTable', 'monthlyTotalVal', monthlyCache);

  // 先月（20日締め）
  const prevPeriod = getPrevMonthlyPeriod();
  try {
    const res2 = await gasCall({ action: 'getRecords', startDate: prevPeriod.startDate, endDate: prevPeriod.endDate });
    if (res2.ok) prevMonthlyCache = res2.records[empId] || {};
  } catch(e) {}
  renderMonthly(prevPeriod, 'prevMonthlyTitle', 'prevMonthlyTable', 'prevMonthlyTotalVal', prevMonthlyCache);
}

function renderMonthly(period, titleId, tableId, totalId, cache) {
  const container = document.getElementById(tableId);
  const titleEl = document.getElementById(titleId);
  const totalEl = document.getElementById(totalId);

  // タイトル更新
  if (titleEl) {
    titleEl.textContent = period.startDate.slice(5) + ' 〜 ' + period.endDate.slice(5) + '（20日締め）';
  }

  const dates = [];
  let cur = new Date(period.startDate + 'T00:00:00');
  const end = new Date(period.endDate + 'T00:00:00');
  while (cur <= end) {
    dates.push(cur.getFullYear() + '-' + pad2(cur.getMonth()+1) + '-' + pad2(cur.getDate()));
    cur.setDate(cur.getDate() + 1);
  }

  // データがある日だけ表示
  const activeDates = dates.filter(dk => cache[dk] && (cache[dk].in || cache[dk].out));

  if (!activeDates.length) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.25); font-size:12px; padding:8px 0;">まだ記録がありません</div>';
    if (totalEl) totalEl.textContent = '0時間0分';
    return;
  }

  let totalMins = 0;
  const DAYS = ['日','月','火','水','木','金','土'];

  container.innerHTML = activeDates.map(dk => {
    const r = cache[dk] || {};
    const h = r.in && r.out ? calcHours(r.in, r.out) : null;
    if (h) {
      const [hh, mm] = h.replace('時間', ':').replace('分', '').split(':').map(Number);
      totalMins += hh * 60 + mm;
    }
    const d = new Date(dk + 'T00:00:00');
    const dow = DAYS[d.getDay()];
    return '<div class="hist-row">' +
      '<span class="hist-date">' + dk.slice(5) + '(' + dow + ')</span>' +
      '<div class="hist-times">' +
        '<span class="ht-in">' + (r.in||'--') + '</span>' +
        '<span class="ht-sep">→</span>' +
        '<span class="ht-out">' + (r.out||'--') + '</span>' +
        (h ? '<span class="ht-hrs">(' + h + ')</span>' : '') +
      '</div>' +
    '</div>';
    // 修正ボタンなし（管理者のみ修正可能）
  }).join('');

  if (totalEl) {
    const th = Math.floor(totalMins / 60);
    const tm = totalMins % 60;
    totalEl.textContent = th + '時間' + tm + '分';
  }
}

function renderHistory() {
  const container = document.getElementById('recentHist');
  const sorted = Object.keys(historyCache).sort().reverse().slice(0, 7);
  if (!sorted.length) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.25); font-size:12px; padding:8px 0;">まだ記録がありません</div>';
    return;
  }
  container.innerHTML = sorted.map(dk => {
    const r = historyCache[dk];
    const h = r.in && r.out ? calcHours(r.in, r.out) : null;
    return `<div class="hist-row">
      <span class="hist-date">${dk.slice(5)}</span>
      <div class="hist-times">
        <span class="ht-in">${r.in||'--'}</span>
        <span class="ht-sep">→</span>
        <span class="ht-out">${r.out||'--'}</span>
        ${h ? `<span class="ht-hrs">(${h})</span>` : ''}
      </div>
      <button class="edit-btn" onclick="openEditModal('${currentEmpId}','${dk}')">修正</button>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// EDIT MODAL
// ─────────────────────────────────────────
function openEditModal(empId, dk) {
  editEmpId = empId; editDateKey = dk;
  const r = historyCache[dk] || {};
  document.getElementById('meIn').value = r.in || '';
  document.getElementById('meOut').value = r.out || '';
  document.getElementById('editModal').classList.add('show');
}
function closeModal() { document.getElementById('editModal').classList.remove('show'); }

async function saveEdit() {
  if (!editEmpId || !editDateKey) return;
  const inT = document.getElementById('meIn').value;
  const outT = document.getElementById('meOut').value;
  try {
    await gasCall({ action: 'saveRecord', empId: editEmpId, dateKey: editDateKey, inTime: inT, outTime: outT });
    if (editDateKey === todayKey()) {
      if (!todayRecords[editEmpId]) todayRecords[editEmpId] = {};
      todayRecords[editEmpId] = { in: inT, out: outT };
      renderPunchScreen();
    }
    closeModal();
    await loadHistory(editEmpId);
    showToast('修正しました', 'ok');
  } catch(e) { showToast('修正に失敗しました', 'err'); }
}

// ─────────────────────────────────────────
// STAMP
// ─────────────────────────────────────────
function showStamp(label, time) {
  const ov = document.getElementById('stampOverlay');
  document.getElementById('stampLabel').textContent = label;
  document.getElementById('stampTime').textContent = time;
  ov.classList.add('show');
  setTimeout(() => ov.classList.remove('show'), 1600);
}

// ─────────────────────────────────────────
// EMAIL (Anthropic API + Gmail MCP)
// ─────────────────────────────────────────
async function sendPunchEmail(emp, dateKey, rec, type) {
  const addrs = settings.emailSettings?.addresses || [];
  if (!addrs.length) return;
  const mgrName = (settings.manager?.last || settings.manager?.first)
    ? `${settings.manager.last} ${settings.manager.first}`.trim() : '管理者';
  const sender = settings.emailSettings?.senderName || '勤怠管理システム';
  const fullName = `${emp.last} ${emp.first}`;
  const isIn = type === 'in';
  const labelJP = isIn ? '出勤' : '退勤';
  const punchTime = isIn ? rec.in : rec.out;
  const hours = rec.in && rec.out ? calcHours(rec.in, rec.out) : null;
  const subject = `【${labelJP}報告】${fullName} - ${dateKey} ${punchTime}`;
  const body = [
    `${sender}から自動送信されました。`,
    `担当管理者：${mgrName} 様`,
    '────────────────',
    `従業員名：${fullName}`,
    `日　　付：${dateKey}`,
    `${labelJP}時刻：${punchTime}`,
    isIn ? '退勤時刻：（未打刻）' : `出勤時刻：${rec.in||'未記録'}`,
    ...(!isIn && hours ? [`勤務時間：${hours}`] : []),
    '────────────────',
    '※開封確認が設定されています。',
    '※このメールは自動送信です。'
  ].join('\n');

  for (const addr of addrs) {
    try {
      await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{ role: 'user', content: `以下の内容でGmailからメールを送信してください。\n宛先：${addr}\n件名：${subject}\n本文：\n${body}\n\n重要：Disposition-Notification-To: ${addr} ヘッダーを追加して開封確認を有効にしてください。` }],
          mcp_servers: [{ type: 'url', url: 'https://gmail.mcp.claude.com/mcp', name: 'gmail-mcp' }]
        })
      });
    } catch(e) { console.warn('メール送信エラー', e); }
  }
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// 起動
// ─────────────────────────────────────────
window.addEventListener('load', async () => {
  await loadInitialData();
  renderNameList();
  // QRコードからの直接アクセス
  const p = new URLSearchParams(location.search);
  const empId = p.get('emp');
  if (empId && employees.find(e => e.id === empId)) openPunch(empId);
});
