<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東海商販 出退勤</title>
  <style>
    :root{
      --navy:#0f1b35;
      --navy2:#1a2d52;
      --accent:#e8a020;
      --bg:#f4f6fa;
      --white:#ffffff;
      --border:#d0d7e3;
      --text:#1a2340;
      --muted:#6b7a99;
      --green:#1db954;
      --red:#e53935;
      --blue:#1565c0;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:720px;
      background:var(--white);
      border-radius:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.12);
      padding:26px 22px;
    }

    .title{
      text-align:center;
      margin-bottom:22px;
    }

    .title h1{
      font-size:24px;
      color:var(--navy);
      margin-bottom:6px;
    }

    .title p{
      color:var(--muted);
      font-size:13px;
    }

    .emp-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .emp-btn{
      border:2px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:16px 10px;
      font-size:18px;
      font-weight:700;
      color:var(--navy);
      cursor:pointer;
      transition:.2s;
    }

    .emp-btn:hover{border-color:var(--accent);}
    .emp-btn.selected{
      background:var(--navy);
      color:#fff;
      border-color:var(--navy);
    }

    .main-btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:15px 14px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      margin-top:18px;
    }

    .btn-primary{
      background:var(--navy);
      color:#fff;
    }

    .btn-secondary{
      background:#eef2f8;
      color:var(--navy);
    }

    .btn-qr{
      background:var(--accent);
      color:var(--navy);
    }

    .punch-top{
      text-align:center;
      margin-bottom:18px;
    }

    .punch-name{
      font-size:26px;
      font-weight:700;
      color:var(--navy);
      margin-bottom:8px;
    }

    .punch-date{
      font-size:15px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .punch-clock{
      font-size:42px;
      font-weight:700;
      color:var(--navy);
      letter-spacing:2px;
    }

    .qr-card{
      margin-top:18px;
      background:#fff8e8;
      border:2px solid #f2d28b;
      border-radius:14px;
      padding:16px;
    }

    .qr-title{
      font-size:15px;
      font-weight:700;
      color:var(--navy);
      margin-bottom:8px;
    }

    .qr-status{
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      min-height:22px;
    }

    .qr-status.ok{
      color:#166534;
      font-weight:700;
    }

    .qr-status.err{
      color:#b91c1c;
      font-weight:700;
    }

    #qrReaderWrap{
      display:none;
      margin-top:12px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#000;
    }

    #qrReader{
      width:100%;
    }

    .shift-area{
      margin-top:20px;
    }

    .section-label{
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .shift-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .shift-btn{
      border:2px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:14px 8px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      color:var(--navy);
    }

    .shift-btn.selected{
      background:var(--accent);
      color:var(--navy);
      border-color:var(--accent);
    }

    .stamp-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:20px;
    }

    .stamp-btn{
      border:none;
      border-radius:14px;
      padding:18px 10px;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
    }

    .btn-in{background:var(--green);}
    .btn-out{background:var(--red);}
    .stamp-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .stamp-area{
      margin-top:16px;
      min-height:44px;
    }

    .stamp{
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      font-weight:700;
    }

    .stamp-in{
      background:#dff6e7;
      color:#166534;
    }

    .stamp-out{
      background:#fde2e2;
      color:#991b1b;
    }

    .stamp-err{
      background:#fff0f0;
      color:#b91c1c;
    }

    .note-card{
      margin-top:18px;
      background:#f7f9fc;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
    }

    .note-card h3{
      font-size:15px;
      color:var(--navy);
      margin-bottom:8px;
    }

    .note-card p{
      font-size:13px;
      color:var(--muted);
      line-height:1.7;
    }

    .lock-note{
      margin-top:10px;
      font-size:13px;
      color:var(--blue);
      text-align:center;
      min-height:20px;
      font-weight:700;
    }

    .loading{
      text-align:center;
      color:var(--muted);
      padding:16px 0;
      font-size:14px;
    }

    @media (max-width:640px){
      .card{padding:20px 16px;}
      .emp-grid{grid-template-columns:1fr;}
      .shift-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .stamp-actions{grid-template-columns:1fr;}
      .punch-clock{font-size:34px;}
    }
  </style>
</head>
<body>

  <div id="empScreen" class="screen">
    <div class="card">
      <div class="title">
        <h1>🏢 東海商販 出退勤</h1>
        <p>名前を選んで進んでください</p>
      </div>

      <div id="empGrid" class="emp-grid">
        <div class="loading">従業員を読み込み中...</div>
      </div>

      <button class="main-btn btn-primary" onclick="goToPunch()">この名前で進む</button>
    </div>
  </div>

  <div id="punchScreen" class="screen" style="display:none;">
    <div class="card">
      <div class="punch-top">
        <div id="punchName" class="punch-name">---</div>
        <div id="punchDate" class="punch-date">---</div>
        <div id="punchClock" class="punch-clock">--:--:--</div>
      </div>

      <div class="qr-card">
        <div class="qr-title">職場QRコード認証</div>
        <div id="qrStatus" class="qr-status">打刻する前に、職場のQRコードを読み取ってください</div>
        <button id="btnStartQr" class="main-btn btn-qr" onclick="startQrScan()">QRコードを読み取る</button>
        <button id="btnStopQr" class="main-btn btn-secondary" onclick="stopQrScan()" style="display:none;">読み取りを閉じる</button>
        <div id="qrReaderWrap">
          <div id="qrReader"></div>
        </div>
      </div>

      <div class="shift-area">
        <div class="section-label">勤務形態を選択</div>
        <div class="shift-grid">
          <button class="shift-btn selected" onclick="selectShift('day',this)">日</button>
          <button class="shift-btn" onclick="selectShift('s1',this)">①</button>
          <button class="shift-btn" onclick="selectShift('s2',this)">②</button>
          <button class="shift-btn" onclick="selectShift('s3',this)">③</button>
        </div>
      </div>

      <div class="stamp-actions">
        <button id="btnIn" class="stamp-btn btn-in" onclick="doPunch('in')">出勤</button>
        <button id="btnOut" class="stamp-btn btn-out" onclick="doPunch('out')">退勤</button>
      </div>

      <div id="lockNote" class="lock-note"></div>
      <div id="stampArea" class="stamp-area"></div>

      <div class="note-card">
        <h3>ご案内</h3>
        <p>
          ・打刻前に、職場の固定QRコード読み取りが必要です。<br>
          ・QR認証後、5分間だけ出勤・退勤ボタンを押せます。<br>
          ・打刻後は同じ種類の再打刻が3時間制限されます。<br>
          ・社員画面では記録一覧を表示しない安全版にしています。<br>
          ・記録確認や修正は管理画面で行ってください。
        </p>
      </div>

      <button class="main-btn btn-secondary" onclick="goBack()">名前選択へ戻る</button>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZg6bsDIl427TEZ8v7ECY1ZfeADqyJRKZYZgiac3M-5cywdRpZr0qGjuTksgpNjtlD/exec';
    const LOCK_MS = 3 * 60 * 60 * 1000;
    const QR_AUTH_MS = 5 * 60 * 1000;
    const FIXED_QR_TEXT = 'TOKAI-SHOUHAN-ATTEND-QR-2026';

    let employees = [];
    let currentEmp = null;
    let selectedShift = 'day';
    let clockTimer = null;
    let lockTimer = null;
    let qrTimer = null;
    let qrScanner = null;
    let qrScanning = false;
    let qrAuthedUntil = 0;

    async function gasCall(payload) {
      const r = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return r.json();
    }

    window.addEventListener('load', async () => {
      await loadEmployees();

      const params = new URLSearchParams(location.search);
      const empId = params.get('emp');
      if (empId) {
        const emp = employees.find(e => e.id === empId);
        if (emp) {
          openPunch(emp);
        }
      }
    });

    async function loadEmployees() {
      try {
        const res = await gasCall({ action: 'getEmployees' });
        if (res.ok) {
          employees = res.employees || [];
        } else {
          employees = [];
        }
      } catch (e) {
        employees = [];
      }
      renderEmpGrid();
    }

    function renderEmpGrid() {
      const grid = document.getElementById('empGrid');
      if (!employees.length) {
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">管理者画面で従業員を登録してください</div>';
        return;
      }

      grid.innerHTML = employees.map(e => `
        <button class="emp-btn" onclick="selectEmp('${e.id}', this)">
          ${e.last} ${e.first}
        </button>
      `).join('');
    }

    function selectEmp(id, el) {
      document.querySelectorAll('.emp-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      currentEmp = employees.find(e => e.id === id);
    }

    function goToPunch() {
      if (!currentEmp) {
        alert('名前を選んでください');
        return;
      }
      openPunch(currentEmp);
    }

    function openPunch(emp) {
      currentEmp = emp;
      qrAuthedUntil = 0;

      document.getElementById('empScreen').style.display = 'none';
      document.getElementById('punchScreen').style.display = 'flex';
      document.getElementById('punchName').textContent = emp.last + ' ' + emp.first;
      document.getElementById('stampArea').innerHTML = '';
      document.getElementById('lockNote').textContent = '';
      setQrStatus('打刻する前に、職場のQRコードを読み取ってください', '');
      updateQrButtons();

      startClock();
      startLockWatcher();
      startQrWatcher();
      updateButtonLocks();
    }

    function goBack() {
      document.getElementById('punchScreen').style.display = 'none';
      document.getElementById('empScreen').style.display = 'flex';

      if (clockTimer) clearInterval(clockTimer);
      if (lockTimer) clearInterval(lockTimer);
      if (qrTimer) clearInterval(qrTimer);

      stopQrScan(true);
      qrAuthedUntil = 0;

      selectedShift = 'day';
      document.querySelectorAll('.shift-btn').forEach((b, idx) => {
        if (idx === 0) b.classList.add('selected');
        else b.classList.remove('selected');
      });

      document.getElementById('stampArea').innerHTML = '';
      document.getElementById('lockNote').textContent = '';
      setQrStatus('打刻する前に、職場のQRコードを読み取ってください', '');
      updateQrButtons();
    }

    function startClock() {
      updateClock();
      if (clockTimer) clearInterval(clockTimer);
      clockTimer = setInterval(updateClock, 1000);
    }

    function updateClock() {
      const now = new Date();
      const dow = ['日','月','火','水','木','金','土'][now.getDay()];
      document.getElementById('punchDate').textContent =
        now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日（' + dow + '）';

      document.getElementById('punchClock').textContent =
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0') + ':' +
        String(now.getSeconds()).padStart(2, '0');
    }

    function selectShift(key, el) {
      document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedShift = key;
    }

    function getInLockKey() {
      return currentEmp ? 'lock_in_' + currentEmp.id : '';
    }

    function getOutLockKey() {
      return currentEmp ? 'lock_out_' + currentEmp.id : '';
    }

    function getLockRemainMs(key) {
      const at = Number(localStorage.getItem(key) || 0);
      if (!at) return 0;
      const remain = LOCK_MS - (Date.now() - at);
      return remain > 0 ? remain : 0;
    }

    function getQrRemainMs() {
      const remain = qrAuthedUntil - Date.now();
      return remain > 0 ? remain : 0;
    }

    function formatRemain(ms) {
      const totalSec = Math.ceil(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      if (h > 0) return h + '時間' + String(m).padStart(2, '0') + '分';
      if (m > 0) return m + '分' + String(s).padStart(2, '0') + '秒';
      return s + '秒';
    }

    function setQrStatus(message, type) {
      const el = document.getElementById('qrStatus');
      el.textContent = message;
      el.className = 'qr-status';
      if (type === 'ok') el.classList.add('ok');
      if (type === 'err') el.classList.add('err');
    }

    function updateQrButtons() {
      const startBtn = document.getElementById('btnStartQr');
      const stopBtn = document.getElementById('btnStopQr');
      const wrap = document.getElementById('qrReaderWrap');

      if (qrScanning) {
        startBtn.style.display = 'none';
        stopBtn.style.display = '';
        wrap.style.display = 'block';
      } else {
        startBtn.style.display = '';
        stopBtn.style.display = 'none';
        wrap.style.display = 'none';
      }
    }

    function startQrWatcher() {
      updateQrStatusByTime();
      if (qrTimer) clearInterval(qrTimer);
      qrTimer = setInterval(() => {
        updateQrStatusByTime();
        updateButtonLocks();
      }, 1000);
    }

    function updateQrStatusByTime() {
      const remain = getQrRemainMs();
      if (remain > 0) {
        setQrStatus('QR認証済みです。あと ' + formatRemain(remain) + ' 有効です', 'ok');
      } else if (!qrScanning) {
        setQrStatus('打刻する前に、職場のQRコードを読み取ってください', '');
      }
    }

    async function startQrScan() {
      if (qrScanning) return;

      if (typeof Html5Qrcode === 'undefined') {
        setQrStatus('QR読み取りライブラリの読み込みに失敗しました', 'err');
        return;
      }

      try {
        qrScanner = new Html5Qrcode('qrReader');
        qrScanning = true;
        updateQrButtons();
        setQrStatus('カメラを起動しています。職場のQRコードをかざしてください', '');

        await qrScanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          onQrReadSuccess,
          () => {}
        );
      } catch (e) {
        qrScanning = false;
        updateQrButtons();
        setQrStatus('カメラを起動できませんでした。カメラ許可をご確認ください', 'err');
      }
    }

    async function stopQrScan(silent = false) {
      if (!qrScanner || !qrScanning) {
        qrScanning = false;
        updateQrButtons();
        return;
      }

      try {
        await qrScanner.stop();
      } catch (e) {
      }

      try {
        await qrScanner.clear();
      } catch (e) {
      }

      qrScanner = null;
      qrScanning = false;
      updateQrButtons();

      if (!silent && getQrRemainMs() <= 0) {
        setQrStatus('打刻する前に、職場のQRコードを読み取ってください', '');
      }
    }

    async function onQrReadSuccess(decodedText) {
      const value = String(decodedText || '').trim();

      if (value !== FIXED_QR_TEXT) {
        setQrStatus('このQRコードは使用できません。職場のQRコードを読み取ってください', 'err');
        return;
      }

      qrAuthedUntil = Date.now() + QR_AUTH_MS;
      setQrStatus('QR認証に成功しました。5分間、打刻できます', 'ok');
      await stopQrScan(true);
      updateButtonLocks();
    }

    function updateButtonLocks() {
      const btnIn = document.getElementById('btnIn');
      const btnOut = document.getElementById('btnOut');

      const inRemain = getLockRemainMs(getInLockKey());
      const outRemain = getLockRemainMs(getOutLockKey());
      const qrRemain = getQrRemainMs();

      const busyIn = btnIn.dataset.busy === '1';
      const busyOut = btnOut.dataset.busy === '1';
      const qrLocked = qrRemain <= 0;

      btnIn.disabled = busyIn || qrLocked || inRemain > 0;
      btnOut.disabled = busyOut || qrLocked || outRemain > 0;

      if (qrLocked) {
        document.getElementById('lockNote').textContent = '職場のQRコードを読み取ると、出勤・退勤ボタンが押せます';
      } else if (inRemain > 0) {
        document.getElementById('lockNote').textContent = '出勤はあと ' + formatRemain(inRemain) + ' で再操作できます';
      } else if (outRemain > 0) {
        document.getElementById('lockNote').textContent = '退勤はあと ' + formatRemain(outRemain) + ' で再操作できます';
      } else {
        document.getElementById('lockNote').textContent = 'QR認証中です。打刻できます';
      }
    }

    async function doPunch(type) {
      if (!currentEmp) {
        document.getElementById('stampArea').innerHTML =
          '<div class="stamp stamp-err">名前を選び直してください</div>';
        return;
      }

      if (getQrRemainMs() <= 0) {
        document.getElementById('stampArea').innerHTML =
          '<div class="stamp stamp-err">先に職場のQRコードを読み取ってください</div>';
        updateButtonLocks();
        return;
      }

      if (type === 'in' && getLockRemainMs(getInLockKey()) > 0) {
        document.getElementById('stampArea').innerHTML =
          '<div class="stamp stamp-err">出勤は3時間経過後に再操作できます</div>';
        return;
      }

      if (type === 'out' && getLockRemainMs(getOutLockKey()) > 0) {
        document.getElementById('stampArea').innerHTML =
          '<div class="stamp stamp-err">退勤は3時間経過後に再操作できます</div>';
        return;
      }

      const now = new Date();
      const dateKey =
        now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0');

      const time =
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0');

      const btnIn = document.getElementById('btnIn');
      const btnOut = document.getElementById('btnOut');
      btnIn.dataset.busy = '1';
      btnOut.dataset.busy = '1';
      updateButtonLocks();

      try {
        const res = await gasCall({
          action: 'punch',
          empId: currentEmp.id,
          type,
          time,
          dateKey,
          shift: selectedShift || 'day'
        });

        if (res.ok) {
          if (type === 'in') {
            localStorage.setItem(getInLockKey(), String(Date.now()));
          } else {
            localStorage.setItem(getOutLockKey(), String(Date.now()));
          }

          qrAuthedUntil = 0;
          updateQrStatusByTime();

          const label = type === 'in' ? '出勤' : '退勤';
          const cls = type === 'in' ? 'stamp-in' : 'stamp-out';

          document.getElementById('stampArea').innerHTML =
            '<div class="stamp ' + cls + '">✓ ' + time + ' ' + label + '打刻しました</div>';
        } else {
          document.getElementById('stampArea').innerHTML =
            '<div class="stamp stamp-err">エラー: ' + (res.error || '通信失敗') + '</div>';
        }
      } catch (e) {
        document.getElementById('stampArea').innerHTML =
          '<div class="stamp stamp-err">通信エラーが発生しました</div>';
      }

      btnIn.dataset.busy = '0';
      btnOut.dataset.busy = '0';
      updateButtonLocks();
    }
  </script>
</body>
</html>
